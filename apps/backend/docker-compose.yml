services:
  postgres:
    image: postgres:16-alpine
    container_name: broken_regist_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-broken_regist}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-broken_regist_password}
      POSTGRES_DB: ${POSTGRES_DB:-broken_regist}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
